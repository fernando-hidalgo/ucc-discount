<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCC Descuentos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">UCC Descuentos</h1>
    <p class="header__subtitle">Válidos 60 días desde su creación</p>
  </header>

  <nav class="tabs" role="tablist">
    <button
      class="tabs__btn tabs__btn--active"
      role="tab"
      aria-selected="true"
      aria-controls="panel-list"
      id="tab-list"
      data-tab="list"
    >
      Mis códigos
    </button>
    <button
      class="tabs__btn"
      role="tab"
      aria-selected="false"
      aria-controls="panel-add"
      id="tab-add"
      data-tab="add"
    >
      Añadir código
    </button>
  </nav>

  <main class="main">
    <section
      class="panel panel--active"
      id="panel-list"
      role="tabpanel"
      aria-labelledby="tab-list"
    >
      <div class="list-toolbar">
        <span class="list-toolbar__label">Ordenar por</span>
        <div class="list-toolbar__controls">
          <div class="sort-toggle" role="group" aria-label="Ordenar por">
            <button
              type="button"
              class="sort-toggle__btn sort-toggle__btn--active"
              data-sort="expiry"
              title="Caducidad: menor a mayor"
              aria-label="Ordenar por caducidad, menor a mayor"
              aria-pressed="true"
            >
              <svg class="sort-toggle__icon" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true">
                <path d="M129-276q-86-86-86-209t86-209q86-86 209-86t209 86q86 86 86 209t-86 209q-86 86-209 86t-209-86Zm633 116v-526l-57 57-42-42 129-129 128 129-42 42-56-56v525h-60ZM421-354l41-41-94-94v-149h-60v172l113 112Z"/>
              </svg>
            </button>
            <button
              type="button"
              class="sort-toggle__btn"
              data-sort="seats"
              title="Butacas: menor a mayor"
              aria-label="Ordenar por butacas, menor a mayor"
              aria-pressed="false"
            >
              <svg class="sort-toggle__icon" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true">
                <path d="M474-486q26-32 38.5-66t12.5-79q0-45-12.5-79T474-776q76-17 133.5 23T665-631q0 82-57.5 122T474-486Zm216 326v-94q0-51-26-95t-90-74q173 22 236.5 64T874-254v94H690Zm110-289v-100H700v-60h100v-100h60v100h100v60H860v100h-60Zm-593-74q-42-42-42-108t42-108q42-42 108-42t108 42q42 42 42 108t-42 108q-42 42-108 42t-108-42ZM0-160v-94q0-35 18.5-63.5T68-360q72-32 128.5-46T315-420q62 0 118 14t128 46q31 14 50 42.5t19 63.5v94H0Z"/>
              </svg>
            </button>
          </div>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button
            type="button"
            class="toolbar-btn"
            id="export-btn"
            title="Exportar JSON"
            aria-label="Exportar códigos a JSON"
          >
            <svg class="sort-toggle__icon" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true">
              <path d="M580 0v-60h300V0H580Zm150-124L584-270l42-42 74 74v-181h60v181l74-74 42 42-146 146Zm-510-36q-24 0-42-18t-18-42v-600q0-24 18-42t42-18h306l234 234v167H520v319H220Zm280-460h200L500-820v200Z"/>
            </svg>
          </button>
          <button
            type="button"
            class="toolbar-btn"
            id="import-btn"
            title="Importar JSON"
            aria-label="Importar códigos desde JSON"
          >
            <svg class="sort-toggle__icon" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true">
              <path d="m201-79-42-43 128-128H161v-60h228v228h-60v-125L201-79Zm248-1v-290H160v-450q0-24.75 17.63-42.38Q195.25-880 220-880h340l240 240v500q0 24.75-17.62 42.37Q764.75-80 740-80H449Zm71-520h220L520-820l220 220-220-220v220Z"/>
            </svg>
          </button>
          <input type="file" id="import-input" accept=".json,application/json" hidden>
        </div>
      </div>
      <p id="list-message" class="list-message" hidden aria-live="polite"></p>
      <div id="code-list" class="code-list" aria-live="polite"></div>
      <p id="empty-list" class="empty-list" hidden>
        No hay códigos guardados. Añade uno en la pestaña «Añadir código».
      </p>
    </section>

    <section
      class="panel"
      id="panel-add"
      role="tabpanel"
      aria-labelledby="tab-add"
      hidden
    >
      <form id="code-form" class="form" novalidate>
        <div class="form__group">
          <label class="form__label" for="code-input">Código de descuento <span class="form__required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="code-input"
            class="form__input"
            placeholder="Ej: 183410766341"
            autocomplete="off"
            required
          >
          <p id="code-validation" class="code-validation" hidden aria-live="polite"></p>
        </div>

        <div class="form__group">
          <label class="form__label" for="seats-input">Número de butacas <span class="form__required" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="seats-input"
            class="form__input"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="Ej: 2"
            required
          >
        </div>

        <div class="form__group">
          <span class="form__label" id="date-label">Fecha de creación <span class="form__required" aria-hidden="true">*</span></span>
          <div class="datepicker" id="datepicker">
            <button
              type="button"
              class="datepicker__trigger"
              id="date-trigger"
              aria-labelledby="date-label"
              aria-required="true"
              aria-expanded="false"
              aria-controls="date-calendar"
            >
              <span id="date-trigger-text"></span>
              <svg class="datepicker__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 4v1h8V6H6z"/>
              </svg>
            </button>
            <div class="datepicker__calendar" id="date-calendar" hidden>
              <div class="datepicker__nav">
                <button type="button" class="datepicker__nav-btn" id="date-prev" aria-label="Mes anterior">‹</button>
                <span class="datepicker__month" id="date-month-label"></span>
                <button type="button" class="datepicker__nav-btn" id="date-next" aria-label="Mes siguiente">›</button>
              </div>
              <div class="datepicker__weekdays" aria-hidden="true">
                <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
              </div>
              <div class="datepicker__grid" id="date-grid" role="grid"></div>
              <button type="button" class="datepicker__today" id="date-today">Ir a hoy</button>
            </div>
          </div>
          <p class="form__hint">Por defecto es hoy. Puedes elegir una fecha pasada para códigos antiguos.</p>
        </div>

        <div class="form__actions">
          <button type="button" class="btn btn--ghost" id="clear-form-btn">Limpiar</button>
          <button type="submit" class="btn btn--primary" id="submit-btn">Guardar</button>
        </div>
        <p id="form-message" class="form-message" hidden></p>
      </form>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
